name: supabase-backup

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight

env:
  BACKUP_ENABLED: true

jobs:
  run_db_backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_ENABLED: ${{ vars.BACKUP_ENABLED }}
    
    steps:
      - name: Check if backups are enabled
        run: |
          if [ "$BACKUP_ENABLED" != "true" ]; then
            echo "::warning::Backups are disabled. Exiting workflow."
            exit 0
          fi

      - name: Verify environment variables
        if: env.BACKUP_ENABLED == 'true'
        run: |
          if [[ ! "$SUPABASE_DB_URL" == postgresql://* ]]; then
            echo "::error::Database URL has incorrect format"
            exit 1
          fi
          echo "Database URL has correct format"

      - name: Checkout repository
        if: env.BACKUP_ENABLED == 'true'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0  # Fetch all history for proper Git operations

      - name: Generate timestamp
        id: timestamp
        run: |
          echo "time=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT
          echo "is_first_of_month=$([ "$(date +'%d')" -eq 1 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Setup Supabase CLI
        if: env.BACKUP_ENABLED == 'true'
        uses: supabase/setup-cli@v1.5.0  # v1.5
        with:
          version: latest

      - name: Create backup directories
        if: env.BACKUP_ENABLED == 'true'
        run: mkdir -p prisma/backups/daily prisma/backups/monthly

      - name: Backup database
        if: env.BACKUP_ENABLED == 'true'
        run: |
          mkdir -p /tmp/backup-staging/${{ steps.timestamp.outputs.time }}

          # Backup roles
          supabase db dump --db-url "$SUPABASE_DB_URL" \
            -f /tmp/backup-staging/${{ steps.timestamp.outputs.time }}/roles.sql --role-only

          # Backup schema
          supabase db dump --db-url "$SUPABASE_DB_URL" \
            -f /tmp/backup-staging/${{ steps.timestamp.outputs.time }}/schema.sql

          # Backup data
          supabase db dump --db-url "$SUPABASE_DB_URL" \
            -f /tmp/backup-staging/${{ steps.timestamp.outputs.time }}/data.sql --data-only --use-copy

      - name: Compress and store daily backup
        if: env.BACKUP_ENABLED == 'true'
        run: |
          cd /tmp/backup-staging
          tar -czf ${{ steps.timestamp.outputs.time }}.tar.gz ${{ steps.timestamp.outputs.time }}
          cp ${{ steps.timestamp.outputs.time }}.tar.gz \
            $GITHUB_WORKSPACE/prisma/backups/daily/${{ steps.timestamp.outputs.time }}.tar.gz

      - name: Store monthly backup
        if: env.BACKUP_ENABLED == 'true' && steps.timestamp.outputs.is_first_of_month == 'true'
        run: |
          cp /tmp/backup-staging/${{ steps.timestamp.outputs.time }}.tar.gz \
            $GITHUB_WORKSPACE/prisma/backups/monthly/${{ steps.timestamp.outputs.time }}.tar.gz

      #Send to S3 bucket - not tested
      #------------------------------
      # - name: Configure AWS credentials
      #   if: env.BACKUP_ENABLED == 'true'
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      
      # - name: Upload backup to S3
      #   if: env.BACKUP_ENABLED == 'true'
      #   run: |
      #     # Upload the latest backup to S3
      #     cd prisma/backups/daily
      #     aws s3 cp ${{ steps.timestamp.outputs.time }}.tar.gz s3://${{ vars.S3_BUCKET_NAME }}/database-backups/daily/${{ steps.timestamp.outputs.time }}.tar.gz
          
      #     # Optional: Add metadata
      #     aws s3api put-object-tagging --bucket ${{ vars.S3_BUCKET_NAME }} \
      #       --key database-backups/daily/${{ steps.timestamp.outputs.time }}.tar.gz \
      #       --tagging 'TagSet=[{Key=backup-type,Value=supabase},{Key=created-by,Value=github-actions}]'
          
      #     echo "Backup uploaded to S3: s3://${{ vars.S3_BUCKET_NAME }}/database-backups/daily/${{ steps.timestamp.outputs.time }}.tar.gz"   

      - name: Cleanup old backups
        if: env.BACKUP_ENABLED == 'true'
        run: |
          # Keep the 7 most recent daily backups; tail -n +8 selects from the 8th onward for deletion
          cd $GITHUB_WORKSPACE/prisma/backups/daily
          if ls *.tar.gz 1> /dev/null 2>&1; then
            ls -t *.tar.gz | tail -n +8 | xargs -r rm
          else
            echo "No daily backups to clean up"
          fi

          # Keep the 12 most recent monthly backups; tail -n +13 selects from the 13th onward for deletion
          cd $GITHUB_WORKSPACE/prisma/backups/monthly
          if ls *.tar.gz 1> /dev/null 2>&1; then
            ls -t *.tar.gz | tail -n +13 | xargs -r rm
          else
            echo "No monthly backups to clean up"
          fi

      - name: Debug Git Status
        if: env.BACKUP_ENABLED == 'true'
        run: |
          echo "=== Daily backups ==="
          ls -la $GITHUB_WORKSPACE/prisma/backups/daily
          echo "=== Monthly backups ==="
          ls -la $GITHUB_WORKSPACE/prisma/backups/monthly
          git -C $GITHUB_WORKSPACE status
          git -C $GITHUB_WORKSPACE add -f prisma/backups/daily/*.tar.gz || echo "No daily files to add"
          git -C $GITHUB_WORKSPACE add -f prisma/backups/monthly/*.tar.gz || echo "No monthly files to add"

      - name: Commit daily backup                                                                                     
        if: env.BACKUP_ENABLED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5.1.0                                                             
        with:                                                                                                         
          commit_message: "Database Backup - ${{ steps.timestamp.outputs.time }}"
          file_pattern: 'prisma/backups/daily/*.tar.gz'                                                               
          commit_options: '--no-verify'                         
          push_options: '--force'                                                                                     
          status_options: '--untracked-files=no'
          add_options: '-f'                                                                                           
          skip_checkout: true                                   
                                                                                                                      
      - name: Commit monthly backup
        if: env.BACKUP_ENABLED == 'true' && steps.timestamp.outputs.is_first_of_month == 'true'                       
        uses: stefanzweifel/git-auto-commit-action@v5.1.0                                      
        with:                                            
          commit_message: "Monthly Database Backup - ${{ steps.timestamp.outputs.time }}"
          file_pattern: 'prisma/backups/monthly/*.tar.gz'                                
          commit_options: '--no-verify'                                                                               
          push_options: '--force'                                                                                     
          status_options: '--untracked-files=no'                                                                      
          add_options: '-f'                                                                                           
          skip_checkout: true                                   
